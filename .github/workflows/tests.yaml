name: tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Clone this repository
      uses: actions/checkout@v6

    - name: Set up Python 3.9
      uses: actions/setup-python@v6
      with:
        python-version: "3.9"

    - name: Install Dependencies
      id: dependencies
      run: |
        python -m pip install --upgrade pip
        pip install . --group dev

    # always() && ... is so that all checks get run (but only if deps install)
    # otherwise it'd stop on the first failed check

    - name: Lint with Ruff
      if: always() && steps.dependencies.conclusion == 'success'
      run: ruff check tests

    - name: Check format with Ruff
      if: always() && steps.dependencies.conclusion == 'success'
      run: ruff format --check --diff tests

    # - name: Type check with mypy
    #   if: always() && steps.dependencies.conclusion == 'success'
    #   run: mypy tests

    - name: Run unittests
      if: always() && steps.dependencies.conclusion == 'success'
      run: pytest

    - name: Test building pypi package
      if: always() && steps.dependencies.conclusion == 'success'
      run: python -m build

    - name: Test building sphinx docs
      if: always() && steps.dependencies.conclusion == 'success'
      # TZ=UTC fixes a crash when running sphinx inside nektos/act
      run: TZ=UTC make -C docs html
